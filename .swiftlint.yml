included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 80

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - i
